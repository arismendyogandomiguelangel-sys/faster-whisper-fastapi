services:
  faster-whisper:
    build: .
    container_name: faster-whisper-fastapi
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - whisper-cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  whisper-cache:
